<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Distance Sensor</title>
  <desc id="desc">Stylized distance sensor illustration</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect x="180" y="180" width="440" height="240" rx="28" fill="#0b1220" stroke="#60a5fa" stroke-width="6"/>
  <circle cx="300" cy="300" r="70" fill="#0ea5e9"/>
  <circle cx="500" cy="300" r="70" fill="#0ea5e9"/>
  <circle cx="300" cy="300" r="38" fill="#bae6fd"/>
  <circle cx="500" cy="300" r="38" fill="#bae6fd"/>
  <rect x="220" y="220" width="80" height="16" rx="8" fill="#93c5fd"/>
  <rect x="500" y="220" width="80" height="16" rx="8" fill="#93c5fd"/>
  <text x="400" y="500" text-anchor="middle" fill="#dbeafe" font-family="Arial, sans-serif" font-size="40" font-weight="700">DISTANCE SENSOR</text>
</svg>
